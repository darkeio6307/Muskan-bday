<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studygram Shorts Feed</title>
    <style>
        /* 1. Reset & Full Screen */
        body, html {
            margin: 0;
            padding: 0;
            background-color: #000;
            height: 100%;
            overflow: hidden; /* Scroll sirf container mein hoga */
            font-family: 'Inter', sans-serif;
        }

        /* 2. Scroll Snap Container (Asli Reel Feel) */
        .feed-container {
            width: 100%;
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory; /* Isse video apne aap center mein rukegi */
        }

        .short-card {
            position: relative;
            width: 100%;
            height: 100vh;
            scroll-snap-align: start;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 3. The "Hacker" Crop (Hiding YT Controls) */
        .video-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        iframe {
            position: absolute;
            top: -5%; /* Top bar hiding */
            left: 0;
            width: 100%;
            height: 110%; /* Extra height to hide bottom bar */
            border: none;
            pointer-events: auto; /* Click karke play/pause allow karein */
        }

        /* 4. Social UI Overlays */
        .overlay {
            position: absolute;
            bottom: 40px;
            left: 20px;
            color: white;
            pointer-events: none;
            z-index: 10;
        }

        .user-info {
            background: rgba(0, 0, 0, 0.4);
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 14px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .caption {
            margin-top: 12px;
            font-size: 16px;
            font-weight: 500;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <div class="feed-container">

        <div class="short-card">
            <div class="video-wrapper">
                <iframe src="https://www.youtube.com/embed/p_z7eMAnv0U?autoplay=0&controls=0&loop=1&playlist=p_z7eMAnv0U&rel=0&modestbranding=1" 
                        allow="autoplay; encrypted-media">
                </iframe>
            </div>
            <div class="overlay">
                <span class="user-info">@dark_eio • Science Side 🧪</span>
                <div class="caption">Concept Video #1 🔥</div>
            </div>
        </div>

        <div class="short-card">
            <div class="video-wrapper">
                <iframe src="https://www.youtube.com/embed/VvJgDPbHz8g?autoplay=0&controls=0&loop=1&playlist=VvJgDPbHz8g&rel=0&modestbranding=1" 
                        allow="autoplay; encrypted-media">
                </iframe>
            </div>
            <div class="overlay">
                <span class="user-info">@dark_eio • Fun Learning ✨</span>
                <div class="caption">Study Motivation Short 🚀</div>
            </div>
        </div>

    </div>

</body>
</html>
