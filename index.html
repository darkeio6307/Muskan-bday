<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studygram Social Hub</title>
    <style>
        /* 1. Reset & Full Screen Setup */
        body, html {
            margin: 0;
            padding: 0;
            background-color: #000;
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        /* 2. Scroll Snap Container (Asli Reel Feel) */
        .feed-container {
            width: 100%;
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none; /* Hide scrollbar for Chrome/Safari */
        }
        .feed-container::-webkit-scrollbar { display: none; }

        .short-card {
            position: relative;
            width: 100%;
            height: 100vh;
            scroll-snap-align: start;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 3. The "Hacker" Crop (Hiding YT Controls) */
        .video-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        iframe {
            position: absolute;
            top: -5%; 
            left: 0;
            width: 100%;
            height: 110%; 
            border: none;
            pointer-events: auto;
        }

        /* 4. FIXED UI OVERLAY (Isse naam screen ke andar rahega) */
        .overlay {
            position: absolute;
            bottom: 80px; /* Isse thoda upar kar diya taaki screen se bahar na jaye */
            left: 20px;
            right: 20px;
            color: white;
            pointer-events: none;
            z-index: 999; /* Isse overlay hamesha upar rahega */
        }

        .user-info {
            display: inline-block;
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 15px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
            border: 1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
        }

        .caption {
            margin-top: 15px;
            font-size: 16px;
            font-weight: 500;
            text-shadow: 2px 2px 10px rgba(0,0,0,1);
            max-width: 80%;
        }
    </style>
</head>
<body>

    <div class="feed-container">

        <div class="short-card">
            <div class="video-wrapper">
                <iframe src="https://www.youtube.com/embed/1N3rjIhioJ4?autoplay=0&controls=0&loop=1&playlist=1N3rjIhioJ4&rel=0&modestbranding=1" allow="autoplay; encrypted-media"></iframe>
            </div>
            <div class="overlay">
                <span class="user-info">@dark_eio • Science Hub 🧪</span>
                <div class="caption">Concept Video #1 🚀</div>
            </div>
        </div>

        <div class="short-card">
            <div class="video-wrapper">
                <iframe src="https://www.youtube.com/embed/MXrTEEeHcXI?autoplay=0&controls=0&loop=1&playlist=MXrTEEeHcXI&rel=0&modestbranding=1" allow="autoplay; encrypted-media"></iframe>
            </div>
            <div class="overlay">
                <span class="user-info">@dark_eio • Studygram Special</span>
                <div class="caption">Quick Learning Trick ✨</div>
            </div>
        </div>

        <div class="short-card">
            <div class="video-wrapper">
                <iframe src="https://www.youtube.com/embed/bitYs5SBdeA?autoplay=0&controls=0&loop=1&playlist=bitYs5SBdeA&rel=0&modestbranding=1" allow="autoplay; encrypted-media"></iframe>
            </div>
            <div class="overlay">
                <span class="user-info">@dark_eio • Science Side</span>
                <div class="caption">Physics Experiment 🔬</div>
            </div>
        </div>

        <div class="short-card">
            <div class="video-wrapper">
                <iframe src="https://www.youtube.com/embed/S2gWyMCVCcA?autoplay=0&controls=0&loop=1&playlist=S2gWyMCVCcA&rel=0&modestbranding=1" allow="autoplay; encrypted-media"></iframe>
            </div>
            <div class="overlay">
                <span class="user-info">@dark_eio • Motivational</span>
                <div class="caption">Study Hard, Dream Big! 📚🔥</div>
            </div>
        </div>

    </div>

</body>
</html>
